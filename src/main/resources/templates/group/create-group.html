<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>모임 생성 | 계정 시스템</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" th:href="@{/css/material.css}">
    
    <script th:src="@{/js/tailwind.js}"></script>
    <script th:src="@{/js/fragment/side_head.js}"></script>
    <script th:src="@{/js/auth/auth-utils.js}"></script>
    <script th:src="@{/js/auth/auth-common.js}"></script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 font-display text-slate-900 dark:text-slate-100 antialiased min-h-screen">
    <header th:replace="~{fragment/header :: commonHeader}"></header>

    <div class="relative flex min-h-screen w-full flex-col">
        <main class="flex-1 flex flex-col items-center py-8 px-4 sm:py-20">
            
            <div class="w-full max-w-[550px] bg-white dark:bg-slate-900 p-7 sm:p-14 rounded-[2.5rem] sm:rounded-[3.5rem] shadow-2xl border border-slate-100 dark:border-slate-800 transition-all">
                
                <div th:replace="~{fragment/sidebar :: commonSidebar}"></div>

                <div class="text-center mb-10 sm:mb-12">
                    <h2 class="text-2xl sm:text-3xl font-black mb-4 tracking-tight">모임 생성</h2>
                    <p class="text-slate-500 text-sm sm:text-base font-medium leading-relaxed">
                        새로운 모임을 만들고<br/>함께할 멤버들을 초대해 보세요.
                    </p>
                </div>

                <div class="mb-10 px-1">
                    <p class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4 ml-1">모임 이름</p>
                    <div class="relative">
                        <input type="text" id="group-name" placeholder="모임 이름을 입력해주세요"
                               class="w-full h-15 sm:h-16 px-6 rounded-2xl border-2 border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900 text-lg font-black appearance-none focus:border-primary focus:ring-0 transition-all">
                    </div>
                </div>

                <div class="mb-10 p-7 sm:p-8 bg-blue-50/50 dark:bg-primary/5 rounded-[2.5rem] border border-primary/20 flex flex-col gap-6">
                    <div class="px-1">
                        <h2 class="text-xl font-bold tracking-tight">모임계좌 설정</h2>
                        <p class="text-sm text-slate-500 mt-1 font-medium">모임 전용 신규 계좌를 개설합니다.</p>
                    </div>
                    <label class="relative flex cursor-pointer rounded-2xl border-2 border-primary bg-white p-5 shadow-sm transition-all hover:bg-primary/5">
                        <input checked class="h-5 w-5 text-primary focus:ring-0" name="account-option" type="radio" value="new"/>
                        <div class="ml-3 flex flex-col">
                            <span class="block text-sm font-bold">새 계좌 만들기</span>
                            <span class="mt-1 block text-xs font-semibold text-primary">신규 계좌 개설 포함</span>
                        </div>
                    </label>
                </div>

                <div class="mb-10 px-1">
                    <p class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4 ml-1">모임 목적</p>
                    <div class="grid grid-cols-4 gap-2">
                        <button type="button" class="purpose-btn flex items-center justify-center w-full h-11 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-500 text-sm font-bold transition-none">여행</button>
                        <button type="button" class="purpose-btn flex items-center justify-center w-full h-11 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-500 text-sm font-bold transition-none">취미</button>
                        <button type="button" class="purpose-btn flex items-center justify-center w-full h-11 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-500 text-sm font-bold transition-none">데이트</button>
                        <button type="button" class="purpose-btn flex items-center justify-center w-full h-11 rounded-full bg-primary text-white text-sm font-black shadow-md shadow-primary/20 transition-none">동호회</button>
                    </div>
                </div>

                <div class="mb-12 px-1">
                    <p class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4 ml-1">모임 체제</p>
                    <div class="flex p-1.5 bg-slate-50 dark:bg-slate-800/50 rounded-[1.8rem] border border-slate-100 dark:border-slate-800">
                        <button type="button" class="system-tab flex-1 py-3.5 text-base font-black text-primary bg-white dark:bg-slate-700 rounded-2xl shadow-sm transition-all" data-value="continuous">매월</button>
                        <button type="button" class="system-tab flex-1 py-3.5 text-base font-bold text-slate-400 transition-all" data-value="once">일회성</button>
                    </div>
                </div>

                <button id="create-btn" class="w-full h-18 py-5 bg-primary text-white rounded-[1.8rem] font-black text-xl shadow-2xl active:scale-[0.98] transition-all">
                    모임 생성하기
                </button>
            </div>
        </main>
    </div>

    <footer th:replace="~{fragment/footer :: mainFooter}"></footer>
    <script th:src="@{/js/group/create-group.js}"></script>
</body>
</html>
