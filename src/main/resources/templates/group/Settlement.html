<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <title>KKIRI | 정산 관리</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="stylesheet" th:href="@{/css/material.css}">
    <script th:src="@{/js/tailwind.js}"></script>
    <script th:src="@{/js/fragment/side_head.js}"></script>
    <script th:src="@{/js/auth/auth-utils.js}"></script>
    <script th:src="@{/js/auth/auth-common.js}"></script>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen pb-24">
<div th:replace="~{fragment/header :: commonHeader}"></div>

<div class="flex flex-1 relative pt-16 md:pt-20">
    <div th:replace="~{fragment/sidebar :: commonSidebar}"></div>

    <main class="max-w-xl mx-auto p-5 flex flex-col gap-6 w-full mt-4">

        <!-- 헤더 -->
        <div class="flex items-center gap-4 py-4 mb-2">
            <button onclick="history.back()"
                    class="w-10 h-10 flex items-center justify-center bg-white dark:bg-slate-900 rounded-full shadow-sm">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <h2 class="text-xl font-bold flex-1">정산 관리</h2>
            <!-- HOST만 보이는 정산 생성 버튼 -->
            <button id="btn-open-create" onclick="openCreateModal()"
                    class="flex items-center gap-1.5 bg-blue-600 text-white text-xs font-bold px-4 py-2.5 rounded-xl shadow-md active:scale-95 transition-all">
                <span class="material-symbols-outlined text-sm">add</span>
                정산 만들기
            </button>
        </div>

        <!-- 미납 안내 배너 (JS에서 동적 렌더링) -->
        <div id="my-pending-banner" class="hidden bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-700 rounded-2xl p-4"></div>

        <!-- 정산 목록 -->
        <section id="settlement-list" class="flex flex-col gap-3">
            <div class="p-10 text-center text-slate-400 text-sm">
                <span class="material-symbols-outlined animate-spin text-2xl block mx-auto mb-2">progress_activity</span>
                불러오는 중...
            </div>
        </section>

    </main>
</div>

<!-- ===== 정산 생성 모달 ===== -->
<div id="create-modal" class="hidden fixed inset-0 z-[200] bg-black/60 backdrop-blur-sm flex items-end md:items-center justify-center">
    <div class="bg-white dark:bg-slate-900 w-full max-w-xl rounded-t-[2.5rem] md:rounded-[2.5rem] p-6 shadow-2xl">
        <div class="w-10 h-1 bg-slate-200 dark:bg-slate-700 rounded-full mx-auto mb-5 md:hidden"></div>
        <h3 class="font-black text-lg mb-5 flex items-center gap-2">
            <span class="material-symbols-outlined text-blue-600">receipt_long</span>
            새 정산 만들기
        </h3>

        <div class="flex flex-col gap-4">
            <!-- STEP 1: 거래 내역 선택 -->
            <div>
                <div class="flex justify-between items-center ml-1 mb-2">
                    <label class="text-[11px] font-black text-slate-400 uppercase">거래 내역 선택</label>
                    <button onclick="toggleAllTx()" class="text-[11px] font-bold text-blue-600">전체 선택</button>
                </div>
                <!-- 기간 필터 -->
                <div class="flex gap-2 mb-2">
                    <input type="date" id="tx-start" class="flex-1 h-9 rounded-xl border-none bg-slate-100 dark:bg-slate-800 px-3 text-xs font-bold focus:ring-2 focus:ring-blue-500" />
                    <span class="flex items-center text-slate-400 text-xs font-bold">~</span>
                    <input type="date" id="tx-end" class="flex-1 h-9 rounded-xl border-none bg-slate-100 dark:bg-slate-800 px-3 text-xs font-bold focus:ring-2 focus:ring-blue-500" />
                    <button onclick="loadTxList()" class="px-3 h-9 bg-blue-600 text-white text-xs font-bold rounded-xl">조회</button>
                </div>
                <div id="tx-list" class="flex flex-col gap-1.5 max-h-44 overflow-y-auto">
                    <p class="text-xs text-slate-400 text-center py-4">기간을 선택 후 조회하세요</p>
                </div>
            </div>

            <!-- STEP 2: 정산 제목 (자동 입력 가능) -->
            <div>
                <label class="text-[11px] font-black text-slate-400 uppercase ml-1 mb-1 block">정산 제목</label>
                <input type="text" id="create-title" placeholder="예: 3월 회식 정산"
                       class="w-full h-12 rounded-xl border-none bg-slate-100 dark:bg-slate-800 px-4 font-bold text-sm focus:ring-2 focus:ring-blue-500" />
            </div>

            <!-- STEP 3: 총 금액 (선택 시 자동 합산) -->
            <div>
                <label class="text-[11px] font-black text-slate-400 uppercase ml-1 mb-1 block">총 금액 (원)</label>
                <input type="number" id="create-amount" placeholder="0" readonly
                       class="w-full h-12 rounded-xl border-none bg-slate-100 dark:bg-slate-800 px-4 font-bold text-sm text-blue-600 cursor-default" />
            </div>

            <!-- STEP 4: 멤버 선택 -->
            <div>
                <div class="flex justify-between items-center ml-1 mb-2">
                    <label class="text-[11px] font-black text-slate-400 uppercase">참여 멤버 선택</label>
                    <button onclick="toggleAllMembers()" class="text-[11px] font-bold text-blue-600">전체 선택</button>
                </div>
                <div id="member-list" class="flex flex-col gap-2 max-h-40 overflow-y-auto"></div>
            </div>

            <!-- 1/N 미리보기 -->
            <div id="per-person-preview" class="bg-blue-50 dark:bg-blue-900/20 rounded-xl px-4 py-3 text-sm font-bold text-blue-700 dark:text-blue-300 text-center hidden">
                1인당 <span id="per-person-amount">0</span>원
            </div>
        </div>

        <div class="flex gap-3 mt-6">
            <button onclick="closeCreateModal()"
                    class="flex-1 py-3.5 rounded-2xl bg-slate-100 dark:bg-slate-800 font-bold text-sm text-slate-600 dark:text-slate-300">
                취소
            </button>
            <button onclick="submitCreateSettlement()"
                    class="flex-1 py-3.5 rounded-2xl bg-blue-600 text-white font-black text-sm shadow-lg shadow-blue-500/20 active:scale-95 transition-all">
                정산 생성
            </button>
        </div>
    </div>
</div>

<!-- ===== 정산 상세 모달 ===== -->
<div id="detail-modal" class="hidden fixed inset-0 z-[200] bg-black/60 backdrop-blur-sm flex items-end md:items-center justify-center">
    <div class="bg-white dark:bg-slate-900 w-full max-w-xl rounded-t-[2.5rem] md:rounded-[2.5rem] p-6 shadow-2xl">
        <div class="w-10 h-1 bg-slate-200 dark:bg-slate-700 rounded-full mx-auto mb-5 md:hidden"></div>
        <div class="flex justify-between items-start mb-5">
            <div>
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">정산 상세</p>
                <h3 id="detail-title" class="font-black text-lg text-slate-900 dark:text-slate-100"></h3>
            </div>
            <button onclick="closeDetailModal()"
                    class="w-9 h-9 flex items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800">
                <span class="material-symbols-outlined text-slate-500 text-lg">close</span>
            </button>
        </div>

        <div id="detail-list" class="flex flex-col gap-2 max-h-72 overflow-y-auto mb-5"></div>

        <!-- HOST 전용: 삭제 버튼 -->
        <button id="btn-delete-settlement" onclick="deleteSettlement()"
                class="w-full py-3 rounded-2xl border border-rose-200 text-rose-500 font-bold text-sm hover:bg-rose-50 active:scale-95 transition-all">
            정산 삭제
        </button>
    </div>
</div>

<div th:replace="~{fragment/payment-password-modal :: paymentPasswordModal}"></div>

<script th:inline="javascript">
    const PAGE_GROUP_ID = /*[[${groupId}]]*/ 0;
</script>
<script th:src="@{/js/fragment/payment-password-modal.js}"></script>
<script th:src="@{/js/group/settlement.js}"></script>
</body>
</html>
