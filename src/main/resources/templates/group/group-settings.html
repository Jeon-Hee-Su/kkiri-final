<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <title>KKIRI | 그룹 관리</title>
    <script th:src="@{/js/auth/auth-check.js}"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script th:src="@{/js/tailwind.js}"></script>
    <link rel="stylesheet" th:href="@{/css/material.css}">
    <link rel="stylesheet" th:href="@{/css/group/group-settings.css}" />
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dropdown-menu { transform-origin: top; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .dropdown-menu:not(.hidden) { display: block; animation: slideDown 0.2s ease-out; }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .active-scale:active { transform: scale(0.97); }
    </style>
    <script th:src="@{/js/auth/auth-utils.js}"></script>
    <script th:src="@{/js/auth/auth-common.js}"></script>
</head>
<body class="bg-[#fbfcfd] dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
    
    <div th:replace="~{fragment/header :: commonHeader}"></div>

    <div class="flex flex-1 pt-14 md:pt-20">
        <div th:replace="~{fragment/sidebar :: commonSidebar}"></div>

   <main class="flex-1 w-full max-w-2xl mx-auto p-4 md:p-10 flex flex-col gap-6 md:gap-8 pb-24">
     <div class="flex items-center gap-4 py-4 mb-2">
                <button onclick="history.back()"
                    class="w-10 h-10 flex items-center justify-center bg-white dark:bg-slate-900 rounded-full shadow-sm">
                    <span class="material-symbols-outlined">arrow_back</span>
                </button>
                <h2 class="text-xl font-bold">그룹 관리</h2>
            </div>
    <section class="bg-white dark:bg-slate-900 rounded-[2rem] md:rounded-[2.5rem] p-6 md:p-10 shadow-sm border border-slate-100 dark:border-slate-800">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-base md:text-lg font-bold flex items-center gap-2 text-primary">
                <span class="material-symbols-outlined font-variation-fill">edit_note</span> 정보 관리
            </h2>
            <button onclick="updateGroupInfo()" class="text-[10px] md:text-[11px] font-black bg-blue-50 text-blue-600 px-4 py-2 rounded-xl active-scale transition-all">수정</button>
        </div>
        <div class="space-y-5 md:y-6">
            <input type="hidden" id="groupId" th:value="${group?.groupId}" />
            
            <div>
                <label class="text-[10px] md:text-[11px] font-black text-slate-400 uppercase tracking-widest ml-1">모임 이름</label>
                <input type="text" id="groupName" th:value="${group?.groupName}" 
                    class="w-full h-12 md:h-14 mt-1 rounded-2xl border-none bg-slate-100 dark:bg-slate-800 px-5 font-bold focus:ring-2 focus:ring-blue-500 outline-none text-sm md:text-base transition-all" />
            </div>
         <div>
    <label class="text-[10px] md:text-[11px] font-black text-slate-400 uppercase tracking-widest ml-1">모임 목적</label>
    <div class="relative mt-1 custom-dropdown">
        <div onclick="toggleDropdown(this)" class="w-full h-12 md:h-14 rounded-2xl bg-slate-100 dark:bg-slate-800 px-5 flex items-center justify-between cursor-pointer font-bold border-2 border-transparent focus-within:border-blue-500 text-sm md:text-base transition-all">
            <span class="selected-text" th:text="${group?.category != null ? group.category : '선택'}">선택</span>
            <span class="material-symbols-outlined text-slate-400">expand_more</span>
        </div>
        
        <ul class="dropdown-menu hidden absolute left-0 w-full top-[110%] bg-white dark:bg-slate-800 border border-slate-100 rounded-2xl shadow-2xl z-[110] p-2">
            <li onclick="selectOption(this, '여행', 'groupCategory')" class="p-4 hover:bg-blue-50 rounded-xl cursor-pointer font-bold text-xs md:text-sm">여행</li>
            <li onclick="selectOption(this, '취미', 'groupCategory')" class="p-4 hover:bg-blue-50 rounded-xl cursor-pointer font-bold text-xs md:text-sm">취미</li>
            <li onclick="selectOption(this, '데이트', 'groupCategory')" class="p-4 hover:bg-blue-50 rounded-xl cursor-pointer font-bold text-xs md:text-sm">데이트</li>
            <li onclick="selectOption(this, '동호회', 'groupCategory')" class="p-4 hover:bg-blue-50 rounded-xl cursor-pointer font-bold text-xs md:text-sm">동호회</li>
        </ul>
        
        <input type="hidden" id="groupCategory" name="category" th:value="${group?.category}">
    </div>
</div>
        </div>
    </section>

    <section class="bg-white dark:bg-slate-900 rounded-[2rem] md:rounded-[2.5rem] p-6 md:p-10 shadow-sm border border-slate-100 dark:border-slate-800">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-base md:text-lg font-bold flex items-center gap-2 text-emerald-500">
            <span class="material-symbols-outlined font-variation-fill">payments</span> 회비 규칙
        </h2>
        <button onclick="updateFeeRules()" class="text-[10px] md:text-[11px] font-black bg-emerald-50 text-emerald-600 px-4 py-2 rounded-xl active-scale transition-all">저장</button>
    </div>
    
    <div class="mb-6">
        <label class="text-[10px] md:text-[11px] font-black text-slate-400 uppercase tracking-widest ml-1">매월 납부일</label>
        <div class="relative mt-2 custom-dropdown">
            <div onclick="toggleDropdown(this)" class="w-full h-14 rounded-2xl bg-slate-50/80 dark:bg-slate-800 px-5 flex items-center justify-between cursor-pointer font-bold border-none text-sm md:text-base transition-all">
                <span class="selected-text" th:text="${group.regularDay != 0 ? '매월 ' + group.regularDay + '일' : '매월 1일'}">매월 1일</span>
                <span class="material-symbols-outlined text-slate-400">expand_more</span>
            </div>
            <ul class="dropdown-menu hidden absolute left-0 w-full top-[110%] bg-white dark:bg-slate-800 border border-slate-100 rounded-2xl shadow-2xl z-[110] p-2 max-h-48 overflow-y-auto custom-scrollbar">
                <li th:each="day : ${#numbers.sequence(1, 28)}" th:onclick="|selectOption(this, ${day}, 'regularDay')|" 
                    class="p-4 hover:bg-emerald-50 rounded-xl cursor-pointer font-bold text-xs md:text-sm">매월 <span th:text="${day}"></span>일</li>
            </ul>
            <input type="hidden" id="regularDay" name="regularDay" th:value="${group.regularDay != 0 ? group.regularDay : 1}">
        </div>
    </div>

    <div class="mb-8">
        <label class="text-[10px] md:text-[11px] font-black text-slate-400 uppercase tracking-widest ml-1">정기 회비</label>
        <div class="relative mt-2">
            <input type="number" id="regularAmount" th:value="${group.dueAmount}" placeholder="0"
                class="w-full h-14 rounded-[1.5rem] border-none bg-slate-50/80 dark:bg-slate-800 px-12 text-right font-black text-slate-900 focus:ring-0 outline-none text-base transition-all" />
            <span class="absolute right-6 top-1/2 -translate-y-1/2 font-bold text-slate-400">원</span>
        </div>
    </div>

    <div class="p-5 md:p-8 bg-rose-50/50 dark:bg-rose-900/10 rounded-[2rem] border border-rose-100 dark:border-rose-900/20">
        <div class="flex items-center gap-2 mb-6 text-rose-600">
            <span class="material-symbols-outlined text-xl">gavel</span>
            <span class="text-[10px] font-black uppercase tracking-wider">미납 벌칙금 규칙</span>
        </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
    <div>
    <label class="text-[9px] md:text-[10px] font-bold text-rose-400 ml-1">부과 시점</label>
    <div class="relative mt-2 custom-dropdown">
        <div onclick="toggleDropdown(this)" class="w-full h-12 rounded-xl bg-white dark:bg-slate-800 px-4 flex items-center justify-between cursor-pointer font-bold border-none text-xs md:text-sm transition-all shadow-sm">
            <span class="selected-text" th:text="${group.penaltyDay != 0 ? group.penaltyDay + '일 뒤' : '없음'}">없음</span>
            <span class="material-symbols-outlined text-slate-400 text-sm">expand_more</span>
        </div>
        
        <ul class="dropdown-menu hidden absolute left-0 w-full top-[110%] bg-white dark:bg-slate-800 border border-slate-50 rounded-xl shadow-2xl z-[110] p-2">
            <li onclick="selectOption(this, 0, 'penaltyDay')" class="p-3 hover:bg-rose-50 rounded-lg cursor-pointer font-bold text-[10px] md:text-xs text-slate-600">없음</li>
            <li onclick="selectOption(this, 3, 'penaltyDay')" class="p-3 hover:bg-rose-50 rounded-lg cursor-pointer font-bold text-[10px] md:text-xs text-slate-600">3일 뒤</li>
            <li onclick="selectOption(this, 5, 'penaltyDay')" class="p-3 hover:bg-rose-50 rounded-lg cursor-pointer font-bold text-[10px] md:text-xs text-slate-600">5일 뒤</li>
            <li onclick="selectOption(this, 7, 'penaltyDay')" class="p-3 hover:bg-rose-50 rounded-lg cursor-pointer font-bold text-[10px] md:text-xs text-slate-600">7일 뒤</li>
        </ul>
        
        <input type="hidden" id="penaltyDay" name="penaltyDay" th:value="${group.penaltyDay != null ? group.penaltyDay : 0}">
    </div>
</div>
    <div>
        <label class="text-[9px] md:text-[10px] font-bold text-rose-400 ml-1">벌칙금 액수</label>
        <div class="relative mt-2">
            <input type="number" id="penaltyAmount" th:value="${group.penaltyAmount}" placeholder="0"
                class="w-full h-12 rounded-xl border-none bg-white dark:bg-slate-800 px-10 text-right font-bold text-slate-900 focus:ring-2 focus:ring-rose-500 outline-none text-xs md:text-sm transition-all shadow-sm" />
            <span class="absolute right-4 top-1/2 -translate-y-1/2 font-bold text-slate-400 text-[10px]">원</span>
        </div>
    </div>
</div>
    </div>
</section>
  <section th:if="${isMaster}" class="bg-white dark:bg-slate-900 rounded-[2rem] p-6 md:p-10 shadow-sm border border-slate-100 dark:border-slate-800">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
        <h2 class="text-base md:text-lg font-bold flex items-center gap-2 text-amber-500">
            <span class="material-symbols-outlined font-variation-fill">money_off</span> 회비 미납자 알림
        </h2>
        
        <div class="flex items-center gap-3">
            <button type="button" onclick="selectUnpaidMembers()" 
                    class="px-3 py-1.5 bg-rose-50 text-rose-600 rounded-xl text-[11px] md:text-xs font-bold hover:bg-rose-100 transition-colors border border-rose-100">
                미납자 자동 선택
            </button>
            <label class="flex items-center gap-2 cursor-pointer group">
                <input type="checkbox" id="selectAllMembers" onchange="toggleAllMembers(this)" 
                       class="w-4 h-4 rounded border-slate-200 text-amber-500 focus:ring-amber-500">
                <span class="text-xs font-bold text-slate-500 group-hover:text-amber-500">전체 선택</span>
            </label>
        </div>
    </div>
    
    <div class="flex flex-col gap-2 max-h-64 overflow-y-auto pr-1 custom-scrollbar mb-6">
        <th:block th:if="${memberList != null and !#lists.isEmpty(memberList)}">
            <div th:each="member : ${memberList}" 
                 th:classappend="${member.isUnpaid ? 'border-rose-200 bg-rose-50/30' : 'bg-slate-50 border-slate-100'}"
                 class="flex items-center justify-between p-3 md:p-4 rounded-2xl border transition-all">
                
                <label class="flex items-center gap-3 md:gap-4 flex-1 cursor-pointer">
                    <input type="checkbox" name="selectedMember" 
                           th:value="${member.userId}" 
                           th:data-unpaid="${member.isUnpaid}"
                           class="member-checkbox w-4 md:w-5 h-4 md:h-5 rounded-lg border-slate-200 text-amber-500 focus:ring-amber-500" />
                    
                    <div class="flex items-center gap-2 md:gap-3">
                        <div class="w-8 md:w-10 h-8 md:h-10 rounded-full bg-white flex items-center justify-center font-bold text-blue-600 text-xs md:text-sm border border-blue-50" 
                             th:text="${#strings.substring(member.nickname, 0, 1)}">닉</div>
                        
                        <div class="flex flex-col">
                            <div class="flex items-center gap-2">
                                <span class="font-bold text-xs md:text-sm text-slate-800 dark:text-slate-200" th:text="${member.nickname}">닉네임</span>
                                <span th:if="${member.isUnpaid}" class="px-1.5 py-0.5 bg-rose-500 text-white text-[8px] md:text-[9px] rounded-md font-black">UNPAID</span>
                            </div>
                            <span class="text-[9px] md:text-[10px] font-bold text-slate-400" 
                                  th:text="${member.isUnpaid ? '아직 이번 달 회비를 내지 않았어요' : '회비 납부 완료'}">상태 메시지</span>
                        </div>
                    </div>
                </label>
            </div>
        </th:block>
        
        <div th:if="${memberList == null or #lists.isEmpty(memberList)}" class="py-10 text-center text-slate-400 text-xs font-bold">
            멤버 목록을 불러올 수 없습니다.
        </div>
    </div>

  

    <button onclick="sendDueNotification()" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-xs md:text-sm active-scale transition-all shadow-lg flex items-center justify-center gap-2 hover:bg-slate-800">
        <span class="material-symbols-outlined text-lg">forward_to_inbox</span> 미납 알림 쏘기
    </button>
</section>

    <section class="bg-rose-50/50 rounded-2xl p-5 border border-rose-100 flex flex-row items-center justify-between gap-4">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-rose-600">warning</span>
            <div class="flex flex-col">
                <h2 class="text-[10px] font-black uppercase text-rose-600">Danger Zone</h2>
                <p class="text-[9px] font-bold text-rose-400">모든 데이터가 삭제됩니다.</p>
            </div>
        </div>
        <button onclick="deleteGroup()" class="px-4 py-2 bg-rose-600 text-white rounded-xl font-bold text-[10px] active-scale">삭제</button>
    </section>

</main>
    </div>

    <footer th:replace="~{fragment/footer :: mainFooter}"></footer>
    <script th:src="@{/js/group/group-settings.js}"></script>
    <script th:src="@{/js/fragment/side_head.js}"></script>
</body>
</html>
