<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>우리끼리(kkiri) - AI 고객센터</title>

    <script th:src="@{/js/support/service_center.js}"></script>
    <script th:src="@{/js/fragment/side_head.js}"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script th:src="@{/js/tailwind.js}"></script>

    <link rel="stylesheet" th:href="@{/css/support/service_center.css}">
    <link rel="stylesheet" th:href="@{/css/material.css}">
    <script th:src="@{/js/auth/auth-utils.js}"></script>
    <script th:src="@{/js/auth/auth-common.js}"></script>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 h-screen flex flex-col font-display overflow-hidden">

    <div th:replace="~{fragment/header :: commonHeader}"></div>
    <div class="flex flex-1 w-full overflow-hidden">
        <div th:replace="~{fragment/sidebar :: commonSidebar}"></div>
    
		
			
        <main class="flex-1 min-w-0 flex flex-col bg-slate-50 dark:bg-slate-950 transition-colors duration-200 pt-16">
			<div class="min-w-0 items-center flex flex-col gap-1 pl-3">
				<div class="flex flex-row">
				<button onclick="history.back()" 
						class="w-10 h-10 flex items-center justify-center bg-white dark:bg-slate-900 rounded-full shadow-sm text-slate-500 hover:text-primary transition-all active:scale-95 flex-shrink-0">
					<span class="material-symbols-outlined text-[22px]">arrow_back</span>
				</button>
				<h1 class="text-xl sm:text-3xl font-bold text-blue-600 mt-1">
					AI 고객센터에 오신 걸 환영합니다!
				</h1>
				</div>
				<p class="text-sm sm:text-base text-slate-500 dark:text-slate-900 mt-1">
					서비스 이용에 궁금한점이 있다면 자유롭게 질문해주세요.
				</p>
			</div>
			
            <section id="chat-window" class="flex-1 overflow-y-auto p-6 md:p-8 custom-scrollbar flex flex-col">
                <div id="message-container" class="max-w-4xl mx-auto mt-auto space-y-6 w-full">
                    <div class="flex items-start gap-4 mb-6">
                        <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center shrink-0 border border-primary/20">
                            <span class="material-symbols-outlined text-primary text-xl">smart_toy</span>
                        </div>
                        <div class="space-y-1">
                            <p class="text-xs font-semibold text-slate-500 ml-1">고객 센터 봇</p>
                            <div class="bg-white dark:bg-slate-800 p-4 rounded-2xl rounded-tl-none border border-slate-200 dark:border-slate-700 shadow-sm">
                                <p class="text-sm leading-relaxed">
                                    안녕하십니까? 저는 고객 센터 AI Ollkkiri입니다. 무엇이 궁금하신가요?
                                </p>
                            </div>
                        </div>
                    </div>

                </div>
            </section>

            <div class="bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 shadow-[0_-4px_12px_rgba(0,0,0,0.03)]">
                <div class="p-4 max-w-4xl mx-auto">
                    <div class="relative flex items-end gap-2 bg-slate-100 dark:bg-slate-800 p-2 rounded-2xl border border-transparent focus-within:border-primary/30 focus-within:ring-2 focus-within:ring-primary/10 transition-all">
							<div class="flex items-start gap-4 max-w-3xl ml-auto flex-row-reverse">
								<div class="w-10 h-10 rounded-full bg-slate-200 dark:bg-slate-700 overflow-hidden shrink-0 border border-slate-300 dark:border-slate-600">
							    	<img alt="User Avatar" src="/img/default_profile.jpg" class="w-full h-full object-cover" />
								</div>
							</div>
	
                        <textarea id="chat-input" rows="1" class="flex-1 bg-transparent border-none focus:ring-0 py-2 text-sm resize-none custom-scrollbar" placeholder="메시지를 입력하세요..."></textarea>
                        <button id="sendBtn" class="bg-primary text-white p-2 rounded-xl hover:bg-primary-dark shadow-md shadow-primary/20 transition-all active:scale-95">
							<span class="material-symbols-outlined">send</span>
						</button>
                    </div>
                    <p class="text-[15px] text-center text-slate-400 mt-2">AI 답변은 오류가 있을 수 있으므로 중요한 정보는 다시 확인해 주세요.</p>
                </div>
                <div th:replace="~{fragment/footer :: mainFooter}"></div>
            </div>
        </main>
		</div>
    </div>
</body>
</html>
