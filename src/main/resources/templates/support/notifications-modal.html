<div th:fragment="notificationsModal">
    <div id="noti" class="hidden fixed inset-0 z-[110] flex items-center justify-center p-4">
        
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closenoti()"></div>

        <div class="relative z-10 w-full max-w-[520px] bg-white dark:bg-slate-900 shadow-2xl rounded-xl overflow-hidden border border-slate-200 dark:border-slate-800">
            <header class="flex items-center justify-between px-6 py-5 border-b border-slate-100 dark:border-slate-800">
                <div class="flex items-center gap-3">
                    <div class="flex items-center justify-center size-10 rounded-lg bg-primary/10 text-primary">
                        <span class="material-symbols-outlined text-[24px]">lightbulb</span>
                    </div>
                    <div>
                        <h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight">알림</h2>
                        <p class="text-slate-500 dark:text-slate-400 text-xs">당신의 상태를 업데이트 하세요</p>
                    </div>
                </div>
                <button onclick="closenoti()" class="flex items-center justify-center size-8 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-400 transition-colors">
                    <span class="material-symbols-outlined text-[20px]">close</span>
                </button>
            </header>

            <div id="notification-list" class="max-h-[500px] overflow-y-auto">

            </div>

            <footer class="p-4 bg-slate-50 dark:bg-slate-800/50 flex items-center justify-center border-t border-slate-100 dark:border-slate-800">
                <button id="readall" onclick="readall()" class="text-primary hover:text-primary/80 text-sm font-bold tracking-tight transition-colors py-2 px-4 rounded-lg hover:bg-primary/5">
                    모두 읽음 처리하기
                </button>
            </footer>
        </div>
    </div>
</div>
