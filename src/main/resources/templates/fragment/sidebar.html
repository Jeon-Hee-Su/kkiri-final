<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

	<aside id="main-sidebar" th:fragment="commonSidebar" class="fixed left-0 top-0 w-64 h-screen flex-col border-r border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 z-[110] transform -translate-x-full transition-transform duration-300 ease-in-out flex">
   
        
        <div class="p-6 flex items-center justify-between border-b border-slate-100 dark:border-slate-800">
            <div class="flex items-center gap-3 text-primary">
                <a th:href="@{/}">	
					<span class="material-symbols-outlined font-bold">grid_view</span>
                	<span class="font-bold text-lg">우리끼리(kkiri)</span>
				</a>
            </div>
            <button onclick="toggleSidebar()" class="p-2 text-slate-400 hover:bg-slate-100 rounded-lg transition-colors">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        
	    <div class="flex-1 overflow-y-auto p-4">
	        <div th:replace="~{fragment/sidebar :: menuItems}"></div>
	    </div>
	</aside>

    <div th:fragment="menuItems" class="flex flex-col h-full">
        <div class="flex flex-col gap-0.5">
            <p class="px-3 py-2 text-[10px] font-bold uppercase tracking-widest text-slate-400 dark:text-slate-500">Menu</p>
            <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 hover:text-primary transition-all" th:href="@{/account}">
                <span class="material-symbols-outlined text-[22px] text-slate-900">person</span>
                <span class="text-sm font-medium">프로필</span>
            </a>	
			<a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 hover:text-primary transition-all" 
			   th:href="@{/paymentmethod}"> 
			    <span class="material-symbols-outlined text-[22px]">payments</span>
				<span class="text-sm font-medium">결제수단</span>
			</a>
			<a onclick="opennoti()" class="flex items-center cursor-pointer gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 hover:text-primary transition-all">
				<span class="material-symbols-outlined text-[22px]">notifications</span>
				<span class="text-sm font-medium">알림</span>
			</a>
            <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 hover:text-primary transition-all" 
               th:href="@{/setting}"> <span class="material-symbols-outlined text-[22px]">settings</span>
             <span class="text-sm font-medium">설정</span>
            </a>
            
           
        </div>
        <div class="mt-16 flex flex-col gap-1 pt-4 border-t border-slate-100 dark:border-slate-800">
            <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 hover:text-primary transition-all" th:href="@{/service_center}">
                <span class="material-symbols-outlined text-[22px]">help</span>
                <span class="text-sm font-medium">고객센터</span>
            </a>
			<a id="sideloginbtn" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-green-500 hover:bg-green-50 dark:hover:bg-green-900/20 transition-all" th:href="@{/auth/login}">
				<span class="material-symbols-outlined text-[22px]">login</span>
				<span class="text-sm font-medium">Login</span>
			</a>
            <a id="sidelogoutbtn" class="hidden cursor-pointer items-center gap-3 px-3 py-2.5 rounded-lg text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 transition-all">
                <span class="material-symbols-outlined text-[22px]">logout</span>
                <span class="text-sm font-medium">Logout</span>
            </a>
        </div>
    </div>
	<div th:replace="~{support/notifications-modal :: notificationsModal}"></div>
	<script th:src="@{/js/support/notifications-modal.js}"></script>
</body>
</html>
