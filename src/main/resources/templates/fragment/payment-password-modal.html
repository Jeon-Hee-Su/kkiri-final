<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!--
  결제 비밀번호 확인 모달 Fragment
  삽입: <div th:replace="~{fragment/payment-password-modal :: paymentPasswordModal}"></div>
  JS:   <script th:src="@{/js/fragment/payment-password-modal.js}"></script>

  사용법 1 - 그룹 비밀번호 서버 검증:
    openPaymentPasswordModal(groupId, () => { 성공시실행(); });

  사용법 2 - 비밀번호를 직접 받아서 처리 (계좌 등록 등):
    openPaymentPasswordModal(null, (pw) => { registerAccount(pw); },
      { title: '결제 비밀번호 입력', subtitle: '계좌 등록을 위해 입력해주세요.' });
-->

<div th:fragment="paymentPasswordModal">
    <div id="paymentPasswordModal"
         class="hidden fixed inset-0 z-[300] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white dark:bg-slate-900 w-full max-w-[420px] rounded-[2.5rem] p-10 text-center shadow-2xl border border-slate-100 dark:border-slate-800">

            <h3 id="ppm-title" class="text-2xl font-black text-slate-900 dark:text-white mb-2">결제 비밀번호 확인</h3>
            <p id="ppm-status" class="text-slate-500 text-sm font-medium mb-10">숫자 6자리를 입력해주세요.</p>

            <div class="flex justify-center gap-5 mb-12">
                <div class="ppm-dot w-5 h-5 rounded-full border-2 border-slate-200 transition-all duration-150"></div>
                <div class="ppm-dot w-5 h-5 rounded-full border-2 border-slate-200 transition-all duration-150"></div>
                <div class="ppm-dot w-5 h-5 rounded-full border-2 border-slate-200 transition-all duration-150"></div>
                <div class="ppm-dot w-5 h-5 rounded-full border-2 border-slate-200 transition-all duration-150"></div>
                <div class="ppm-dot w-5 h-5 rounded-full border-2 border-slate-200 transition-all duration-150"></div>
                <div class="ppm-dot w-5 h-5 rounded-full border-2 border-slate-200 transition-all duration-150"></div>
            </div>

            <div class="grid grid-cols-3 gap-4">
                <button type="button" onclick="ppmPressKey('1')" class="h-16 rounded-2xl bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-white text-xl font-bold hover:bg-primary hover:text-white active:scale-95 transition-all">1</button>
                <button type="button" onclick="ppmPressKey('2')" class="h-16 rounded-2xl bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-white text-xl font-bold hover:bg-primary hover:text-white active:scale-95 transition-all">2</button>
                <button type="button" onclick="ppmPressKey('3')" class="h-16 rounded-2xl bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-white text-xl font-bold hover:bg-primary hover:text-white active:scale-95 transition-all">3</button>
                <button type="button" onclick="ppmPressKey('4')" class="h-16 rounded-2xl bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-white text-xl font-bold hover:bg-primary hover:text-white active:scale-95 transition-all">4</button>
                <button type="button" onclick="ppmPressKey('5')" class="h-16 rounded-2xl bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-white text-xl font-bold hover:bg-primary hover:text-white active:scale-95 transition-all">5</button>
                <button type="button" onclick="ppmPressKey('6')" class="h-16 rounded-2xl bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-white text-xl font-bold hover:bg-primary hover:text-white active:scale-95 transition-all">6</button>
                <button type="button" onclick="ppmPressKey('7')" class="h-16 rounded-2xl bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-white text-xl font-bold hover:bg-primary hover:text-white active:scale-95 transition-all">7</button>
                <button type="button" onclick="ppmPressKey('8')" class="h-16 rounded-2xl bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-white text-xl font-bold hover:bg-primary hover:text-white active:scale-95 transition-all">8</button>
                <button type="button" onclick="ppmPressKey('9')" class="h-16 rounded-2xl bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-white text-xl font-bold hover:bg-primary hover:text-white active:scale-95 transition-all">9</button>
                <div class="h-16"></div>
                <button type="button" onclick="ppmPressKey('0')" class="h-16 rounded-2xl bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-white text-xl font-bold hover:bg-primary hover:text-white active:scale-95 transition-all">0</button>
                <button type="button" onclick="ppmPressKey('del')" class="h-16 flex items-center justify-center text-slate-400 hover:text-red-400 active:scale-95 transition-all">
                    <span class="material-symbols-outlined text-3xl font-black">backspace</span>
                </button>
            </div>

            <button type="button" onclick="closePaymentPasswordModal()"
                    class="mt-8 text-sm text-slate-400 hover:text-slate-600 transition-colors">
                취소
            </button>
        </div>
    </div>
</div>

</html>
